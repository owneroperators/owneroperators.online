{{ define "main" }}
  <section>
    <header class="page-head">
      <p class="eyebrow"><a href="{{ "/" | relURL }}">OWNER/OPERATORS</a></p>
      <h1 class="page-title">{{ .Title }}</h1>
    </header>
    <div class="prose">
      {{ .Content }}
    </div>
    <ul class="list">
      {{ range .Pages }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  </section>
{{ end }}
