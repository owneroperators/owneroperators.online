{{/* Outbound links. Populated from site.Data.links. */}}
{{ with site.Data.links }}
  <ul class="links">
    {{ range . }}
      <li>
        {{ if .soon }}
          <span class="link link-soon" aria-disabled="true" aria-label="{{ .name }} — coming soon">
            {{ with .ornament }}
              <pre class="link-ornament">{{ . }}</pre>
            {{ end }}
            <span class="link-name">coming soon</span>
          </span>
        {{ else }}
          <a href="{{ .url }}" rel="noopener">
            {{ with .ornament }}
              <pre class="link-ornament">{{ . }}</pre>
            {{ end }}
            <span class="link-name">{{ .name }}</span>
          </a>
        {{ end }}
      </li>
    {{ end }}
  </ul>
{{ end }}
