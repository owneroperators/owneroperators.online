baseURL = "https://owneroperators.online/"
languageCode = "en-us"
title = "OWNER/OPERATORS"
theme = "oo"

enableRobotsTXT = true

[params]
  description = "OWNER/OPERATORS. New single, Echoes and Static — out now."
  artist = "OWNER/OPERATORS"
  # Default social share card (og:image / twitter:image). Pages can override with `ogimage` in front matter.
  ogimage = "/img/og-home.jpg"

[params.release]
  title = "Echoes and Static"
  from = "LOSS LEADER LP"
  # DSP go-live: released 2026-06-13. Now live — treat as out now.
  releaseDate = "2026-06-13"

# Fullscreen background video piped through hydra-synth for live glitch processing.
# Leave `video` unset to fall back to procedural off-air-static noise.
# Video must be same-origin (or CORS-enabled) for WebGL to read its frames.
[params.bg]
  video = "/video/bg.mp4"

[markup.goldmark.renderer]
  unsafe = true

[minify]
  minifyOutput = true
